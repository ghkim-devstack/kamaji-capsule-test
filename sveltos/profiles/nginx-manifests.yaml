apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-demo-manifests
  namespace: projectsveltos
data:
  deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: nginx-demo
      namespace: nginx-demo
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: nginx-demo
      template:
        metadata:
          labels:
            app: nginx-demo
        spec:
          containers:
            - name: nginx
              image: nginx:1.25
              ports:
                - containerPort: 80

  service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: nginx-demo
      namespace: nginx-demo
    spec:
      type: ClusterIP
      selector:
        app: nginx-demo
      ports:
        - port: 80
          targetPort: 80

  namespace.yaml: |
    apiVersion: v1
    kind: Namespace
    metadata:
      name: nginx-demo
