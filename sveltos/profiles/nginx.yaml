apiVersion: config.projectsveltos.io/v1beta1
kind: ClusterProfile
metadata:
  name: nginx-demo
spec:
  clusterSelector:
    matchLabels:
      env: tenant-b
  syncMode: Continuous
  helmCharts:
    - repositoryURL: https://charts.bitnami.com/bitnami
      repositoryName: bitnami
      chartName: bitnami/nginx
      chartVersion: 18.1.11
      releaseName: nginx-demo
      releaseNamespace: nginx-demo
      helmChartAction: Install
      values: |
        image:
          registry: docker.io
          repository: bitnami/nginx
          tag: 1.29.1-debian-12-r0
